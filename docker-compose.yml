version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: oct_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the ML models
      - ./backend/ml:/app/ml
      # Persistent volume for SQLite database
      - sqlite_data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      # Use python for healthcheck since curl is not in the slim image
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_BASE_URL=/api
    container_name: oct_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Use wget for alpine nginx
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
